  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

argin-bottom: 14px;\">\n      <div style=\"width: 40px; height: 40px; border-radius: 11px; background: #EFE8D8; border: 1px solid #E3DAC6; display: flex; align-items: center; justify-content: center; font-size: 21px; flex-shrink: 0;\">{{ chatAvatarText }}</div>\n      <div style=\"flex: 1; min-width: 0;\">\n        <div style=\"font-size: 14.5px; font-weight: 600;\">{{ chatName }}</div>\n        <div style=\"font-size: 12px; color: #2E6B4F; display: flex; align-items: center; gap: 6px;\"><span style=\"width: 6px; height: 6px; background: #2E6B4F; border-radius: 50%; animation: pulse 2s infinite;\"></span>BizAssist · Online</div>\n      </div>\n    </div>\n    <div ref=\"{{ chatRef }}\" style=\"display: flex; flex-direction: column; gap: 10px; height: 330px; overflow-y: auto; scrollbar-width: none;\">\n      <sc-for list=\"{{ chatMsgs }}\" as=\"msg\" hint-placeholder-count=\"2\">\n        <div style=\"{{ msg.style }}\">{{ msg.text }}</div>\n      </sc-for>\n      <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"align-self: flex-start; background: #F5F0E6; border: 1px solid #E3DAC6; padding: 12px 16px; border-radius: 14px; border-bottom-left-radius: 4px; display: flex; gap: 4px;\">\n          <span style=\"width: 6px; height: 6px; background: #A79D8A; border-radius: 50%; animation: blink 1.4s infinite;\"></span>\n          <span style=\"width: 6px; height: 6px; background: #A79D8A; border-radius: 50%; animation: blink 1.4s infinite 0.2s;\"></span>\n          <span style=\"width: 6px; height: 6px; background: #A79D8A; border-radius: 50%; animation: blink 1.4s infinite 0.4s;\"></span>\n        </div>\n      </sc-if>\n    </div>\n    <div style=\"display: flex; align-items: center; gap: 8px; font-size: 11px; color: #A79D8A; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-top: 8px; padding-top: 12px; border-top: 1px solid #EFE8D8;\">\n      <span style=\"flex: 1;\">{{ chatLabel }}</span>\n      <sc-if value=\"{{ dotsVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display: flex; gap: 5px;\">\n          <div style=\"{{ dot0Style }}\"></div>\n          <div style=\"{{ dot1Style }}\"></div>\n        </div>\n      </sc-if>\n    </div>\n    <sc-if value=\"{{ liveChatEnabled }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ sendLive }}\" style=\"display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #EFE8D8;\">\n        <input type=\"text\" placeholder=\"Try it: ask about a cleaning…\" maxlength=\"1000\" value=\"{{ chatInput }}\" onchange=\"{{ onChatInput }}\" disabled=\"{{ chatBusy }}\" style=\"flex: 1; background: #F5F0E6; border: 1px solid #E3DAC6; color: #211C13; padding: 11px 15px; border-radius: 999px; font-size: 14px; font-family: 'Instrument Sans', sans-serif; outline: none;\" style-focus=\"border-color: #2E6B4F;\">\n        <button type=\"submit\" aria-label=\"Send\" data-magnetic=\"true\" disabled=\"{{ chatBusy }}\" style=\"background: #2E6B4F; color: #FFFDF7; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 16px; cursor: pointer; flex-shrink: 0;\" style-hover=\"background: #245641;\">→</button>\n      </form>\n    </sc-if>\n  </div>\n  </div>\n</div>\n\n<!-- STATS -->\n<div data-screen-label=\"Stats\" style=\"max-width: 1180px; margin: 0 auto; padding: 0 32px 40px;\">\n  <div data-reveal-stagger=\"90\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); border-top: 1px solid #D8CFBB; border-bottom: 1px solid #D8CFBB;\">\n    <div style=\"padding: 28px 24px 24px;\"><div data-count=\"24\" data-suffix=\"/7\" style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px;\">24/7</div><div style=\"font-size: 13.5px; color: #7C7361;\">Always answering</div></div>\n    <div style=\"padding: 28px 24px 24px; border-left: 1px solid #E3DAC6;\"><div data-count=\"5\" data-prefix=\"&lt;\" data-suffix=\"s\" style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px;\">&lt;5s</div><div style=\"font-size: 13.5px; color: #7C7361;\">Response time</div></div>\n    <div style=\"padding: 28px 24px 24px; border-left: 1px solid #E3DAC6;\"><div data-count=\"30\" data-prefix=\"−\" data-suffix=\"%\" style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px;\">−30%</div><div style=\"font-size: 13.5px; color: #7C7361;\">Fewer no-shows</div></div>\n    <div style=\"padding: 28px 24px 24px; border-left: 1px solid #E3DAC6;\"><div data-count=\"10\" data-suffix=\" min\" style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px;\">10 min</div><div style=\"font-size: 13.5px; color: #7C7361;\">To set up</div></div>\n  </div>\n</div>\n\n<!-- PROBLEM -->\n<div data-screen-label=\"Problem\" data-reveal-stagger=\"90\" style=\"max-width: 1180px; margin: 0 auto; padding: 88px 32px;\">\n  <p style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #2E6B4F; margin: 0 0 14px;\">The cost of a missed message</p>\n  <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(20px, 2.2vw, 27px); letter-spacing: -1.5px; line-height: 1.08; margin: 0 0 14px;\">Every unanswered client is <br>money walking out the door.</h2>\n  <p style=\"color: #7C7361; font-size: 16.5px; max-width: 540px; line-height: 1.65; margin: 0;\">Your team can't be on the phone 24/7. But your clients expect answers now, or they book with someone who gives them.</p>\n  <div data-reveal-stagger=\"110\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 48px;\">\n    <div style=\"background: #FFFDF7; border: 1px solid #E3DAC6; border-radius: 16px; padding: 30px 28px;\">\n      <div style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-size: 40px; color: #8F4F3D; line-height: 1; margin-bottom: 14px;\">1 in 3</div>\n      <h3 style=\"font-size: 16.5px; font-weight: 600; margin: 0 0 8px;\">Calls go unanswered</h3>\n      <p style=\"font-size: 14.5px; color: #7C7361; line-height: 1.6; margin: 0;\">During busy hours, calls slip through. Each missed call is a client who books somewhere else, and you never even knew.</p>\n    </div>\n    <div style=\"background: #FFFDF7; border: 1px solid #E3DAC6; border-radius: 16px; padding: 30px 28px;\">\n      <div style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-size: 40px; color: #8F4F3D; line-height: 1; margin-bottom: 14px;\">50+</div>\n      <h3 style=\"font-size: 16.5px; font-weight: 600; margin: 0 0 8px;\">Repeat questions daily</h3>\n      <p style=\"font-size: 14.5px; color: #7C7361; line-height: 1.6; margin: 0;\">Hours, pricing, availability, insurance. Your staff answers the same questions over and over instead of doing real work.</p>\n    </div>\n    <div style=\"background: #FFFDF7; border: 1px solid #E3DAC6; border-radius: 16px; padding: 30px 28px;\">\n      <div style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-size: 40px; color: #8F4F3D; line-height: 1; margin-bottom: 14px;\">20–30%</div>\n      <h3 style=\"font-size: 16.5px; font-weight: 600; margin: 0 0 8px;\">Appointments become no-shows</h3>\n      <p style=\"font-size: 14.5px; color: #7C7361; line-height: 1.6; margin: 0;\">Without automatic reminders, clients forget. Empty chairs cost you money you already counted on.</p>\n    </div>\n  </div>\n</div>\n\n<!-- NIGHT / COMPARISON -->\n<div data-screen-label=\"Comparison (night)\" style=\"background: #191510; color: #F5F0E6; border-top: 1px solid #2A251C; border-bottom: 1px solid #2A251C; padding: 96px 32px; position: relative; overflow: hidden;\">\n  <div style=\"position: absolute; inset: 0; pointer-events: none;\">\n    <div style=\"position: absolute; top: 64px; right: 10%; width: 52px t: 700; flex-shrink: 0;\">✕</span>Can only handle one client at a time</li>\n          <li style=\"font-size: 14.5px; color: #9A9081; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #B0705C; font-weight: 700; flex-shrink: 0;\">✕</span>Needs training, management, payroll</li>\n          <li style=\"font-size: 14.5px; color: #9A9081; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #B0705C; font-weight: 700; flex-shrink: 0;\">✕</span>After-hours calls go to voicemail</li>\n        </ul>\n      </div>\n      <div style=\"background: rgba(46,107,79,0.14); border: 1px solid rgba(127,184,154,0.4); border-radius: 18px; padding: 34px 32px;\">\n        <h3 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 18px; font-weight: 700; margin: 0 0 4px;\">BizAssist</h3>\n        <div style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-size: 36px; color: #E5C687; margin-bottom: 22px;\">$250/mo</div>\n        <ul style=\"list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px;\">\n          <li style=\"font-size: 14.5px; color: #CFC7B6; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #7FB89A; font-weight: 700; flex-shrink: 0;\">✓</span>Works 24/7, weekends and holidays</li>\n          <li style=\"font-size: 14.5px; color: #CFC7B6; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #7FB89A; font-weight: 700; flex-shrink: 0;\">✓</span>Never sick, never quits, never late</li>\n          <li style=\"font-size: 14.5px; color: #CFC7B6; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #7FB89A; font-weight: 700; flex-shrink: 0;\">✓</span>Handles unlimited clients at once</li>\n          <li style=\"font-size: 14.5px; color: #CFC7B6; display: flex; gap: 10px; align-items: flex-start;\"><span style=\"color: #7FB89A; font-weight: 700; flex-shrink: 0;\">✓</span>Set up once in 10 minutes</li>\n rsor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 16px;\">How do I get started?<span style=\"font-family: 'Instrument Serif', serif; font-size: 24px; color: #2E6B4F; flex-shrink: 0;\">{{ faqSign4 }}</span></button>\n      <sc-if value=\"{{ faqOpen4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"padding: 0 4px 22px; font-size: 15px; color: #7C7361; line-height: 1.7; margin: 0; max-width: 640px;\">Book a setup call and we'll configure your BizAssist front desk with your real hours, services, and pricing. Most clinics are live within a day.</p>\n      </sc-if>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div data-screen-label=\"CTA\" data-reveal-stagger=\"90\" style=\"max-width: 1180px; margin: 0 auto; padding: 0 32px 96px;\">\n  <div style=\"background: #2E6B4F; border-radius: 26px; padding: 72px 40px; text-align: center; color: #F5F0E6;\">\n    <h2 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(19px, 2vw, 25px); letter-spacing: -1.5px; line-height: 1.08; margin: 0 0 14px;\">Stop losing clients <br>to <span style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: #E5C687;\">voicemail.</span></h2>\n    <p style=\"color: rgba(245,240,230,0.75); margin: 0 0 32px; font-size: 16px;\">Set up your business and your AI front desk is live in minutes.</p>\n    <a href=\"/app\" data-magnetic=\"true\" style=\"display: inline-flex; align-items: center; background: #211C13; color: #F5F0E6; padding: 14px 26px; border-radius: 999px; font-size: 15px; font-weight: 600; font-family: 'Instrument Sans', sans-serif; text-decoration: none; white-space: nowrap; margin: 0 auto 14px;\" style-hover=\"background: #000000;\">Get started</a>\n    <sc-if value=\"{{ ctaDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: inline-block; border: 1px dashed #E5C687; color: #E5C687; padding: 13px 22px; border-radius: 999px; font-size: 14.5px; font-weight: 600; margin-bottom: 14px;\">✓ You're on the list. We'll reach out soon.</div>\n    </sc-if>\n    <p style=\"font-size: 13px; color: rgba(245,240,230,0.55); margin: 0;\">No spam. No credit card. Just a working front desk.</p>\n  </div>\n</div>\n\n<!-- FOOTER -->\n<div data-screen-label=\"Footer\" style=\"border-top: 1px solid #D8CFBB;\">\n  <div style=\"max-width: 1180px; margin: 0 auto; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;\">\n    <p style=\"font-size: 13.5px; color: #A79D8A; margin: 0;\">© 2026 BizAssist · The front desk that never sleeps.</p>\n    <div style=\"display: flex; gap: 24px;\">\n      <a href=\"/privacy.html\" style=\"font-size: 13.5px; color: #A79D8A; text-decoration: none;\" style-hover=\"color: #211C13;\">Privacy</a>\n      <a href=\"/terms.html\" style=\"font-size: 13.5px; color: #A79D8A; text-decoration: none;\" style-hover=\"color: #211C13;\">Terms</a>\n      <a href=\"/refund.html\" style=\"font-size: 13.5px; color: #A79D8A; text-decoration: none;\" style-hover=\"color: #211C13;\">Refunds</a>\n      <a href=\"mailto:hello@bizzassist.xyz\" style=\"font-size: 13.5px; color: #A79D8A; text-decoration: none;\" style-hover=\"color: #211C13;\">Contact</a>\n    </div>\n  </div>\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;autoplayChat&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chat demo&quot;},&quot;demoSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1.25,&quot;min&quot;:0.5,&quot;max&quot;:2.5,&quot;step&quot;:0.25,&quot;unit&quot;:&quot;×&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Chat demo&quot;},&quot;liveChat&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chat demo&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    msgs: [], typing: false, convoIdx: 0, live: false, busy: false,\n    chatInput: '', heroEmail: '', ctaEmail: '', heroDone: false, ctaDone: false,\n    openFaq: -1, now: Date.now(), tickIdx: 0,\n  };\n\n  chatRef = React.createRef();\n  liveHistory = [];\n  timer = null;\n  tickerMsgs = [\n    'is answering right now.',\n    'just booked a cleaning for Thursday.',\n    'just answered a pricing question.',\n    \"is sending tomorrow's reminders.\",\n    'just replied to an after-hours message.',\n  ];\n\n  conversations = [\n    {\n      name: 'Bright Smile Dental', avatar: '🦷', label: 'Booking an appointment',\n      messages: [\n        { type: 'client', text: 'Hi, do you have any openings this week for a cleaning?' },\n        { type: 'typing' },\n        { type: 'bot', text: 'Hi! Yes, we have Thursday at 2:00 PM or Friday at 10:30 AM open. Which works better for you?' },\n        { type: 'client', text: 'Thursday at 2 sounds great' },\n        { type: 'typing' },\n        { type: 'bot', text: 'Perfect! Can I get your name and phone number to confirm?' },\n        { type: 'client', text: 'Sarah M, 555 0142' },\n        { type: 'action', text: '✓ Appointment booked · Thursday 2:00 PM' },\n        { type: 'bot', text: \"You're all set, Sarah! I'll text you a reminder the night before. See you Thursday.\" },\n      ],\n    },\n    {\n      name: 'Luxe Hair Studio', avatar: '💇', label: 'After-hours · 11:42 PM',\n      messages: [\n        { type: 'client', text: 'Hey, are you open on Sundays?' },\n        { type: 'typing' },\n        { type: 'bot', text: \"Hi! We're open Sunday 10 AM – 4 PM. Want me to check availability for a specific service?\" },\n        { type: 'client', text: 'Yeah, how much is a balayage?' },\n        { type: 'typing' },\n        { type: 'bot', text: 'Balayage starts at $120 depending on hair length. Our stylist Maya has Sunday slots open. Want me to book you in?' },\n        { type: 'client', text: 'Yes please, Sunday at 11' },\n        { type: 'action', text: '✓ Appointment booked · Sunday 11:00 AM · Maya' },\n        { type: 'bot', text: \"Done! You'll get a confirmation text shortly. See you Sunday.\" },\n      ],\n    },\n  ];\n\n  componentDidMount() {\n    if (this.props.autoplayChat ?? true) this.playConvo(0);\n    this._reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.setupReveals();\n    this.setupCounters();\n    this.setupMagnetic();\n    this.setupParallax();\n    this._clockTimer = setInterval(() => this.setState({ now: Date.now() }), 1000);\n    this._tickerTimer = setInterval(() => this.setState((s) => ({ tickIdx: ((s.tickIdx || 0) + 1) % this.tickerMsgs.length })), 4200);\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this.timer);\n    clearInterval(this._clockTimer);\n    clearInterval(this._tickerTimer);\n    if (this._io) this._io.disconnect();\n    if (this._cio) this._cio.disconnect();\n    if (this._magnetMove) document.removeEventListener('pointermove', this._magnetMove);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  componentDidUpdate() {\n    const el = this.chatRef.current;\n    const sig = this.state.msgs.length + ':' + this.state.typing + ':' + this.state.live;\n    if (el && sig !== this._chatSig) {\n      this._chatSig = sig;\n      el.scrollTop = el.scrollHeight;\n    }\n  }\n\n  formatClock(t) {\n    const d = new Date(t || Date.now());\n    let h = d.getHours();\n    const ampm = h >= 12 ? 'PM' : 'AM';\n    h = h % 12 || 12;\n    const m = String(d.getMinutes()).padStart(2, '0');\n    const sec = String(d.getSeconds()).padStart(2, '0');\n    return h + ':' + m + ':' + sec + ' ' + ampm;\n  }\n\n  setupReveals() {\n    if (this._reduced) return;\n    document.querySelectorAll('[data-reveal-stagger]').forEach((g) => {\n      const step = parseInt(g.getAttribute('data-reveal-stagger'), 10) || 100;\n      let i = 0;\n      Array.from(g.children).forEach((child) => {\n        if (!child.hasAttribute('data-reveal-stagger') && !child.hasAttribute('data-reveal')) {\n          child.setAttribute('data-reveal', String(i * step));\n        }\n        i++;\n      });\n    });\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    els.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n    });\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (!en.isIntersecting) return;\n        const el = en.target;\n        const delay = parseInt(el.getAttribute('data-reveal'), 10) || 0;\n        el.style.transition = 'opacity 0.8s ease ' + delay + 'ms, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1) ' + delay + 'ms';\n        el.style.opacity = '1';\n        el.style.transform = 'translateY(0px)';\n        this._io.unobserve(el);\n      });\n    }, { threshold: 0.12 });\n    els.forEach((el) => this._io.observe(el));\n  }\n\n  setupCounters() {\n    if (this._reduced) return;\n    const els = document.querySelectorAll('[data-count]');\n    this._cio = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (!en.isIntersecting) return;\n        const el = en.target;\n        this._cio.unobserve(el);\n        const target = parseFloat(el.getAttribute('data-count'));\n        const prefix = el.getAttribute('data-prefix') || '';\n        const suffix = el.getAttribute('data-suffix') || '';\n        const t0 = performance.now();\n        const dur = 1300;\n        const tick = (t) => {\n          const p = Math.min(1, (t - t0) / dur);\n          const eased = 1 - Math.pow(1 - p, 3);\n          el.textContent = prefix + Math.round(target * eased) + suffix;\n          if (p < 1) requestAnimationFrame(tick);\n        };\n        requestAnimationFrame(tick);\n      });\n    }, { threshold: 0.6 });\n    els.forEach((el) => this._cio.observe(el));\n  }\n\n  setupMagnetic() {\n    if (this._reduced) return;\n    this._magnetMove = (e) => {\n      const el = e.target && e.target.closest ? e.target.closest('[data-magnetic]') : null;\n      if (el) {\n        if (this._magnetEl && this._magnetEl !== el) this.resetMagnet();\n        this._magnetEl = el;\n        const r = el.getBoundingClientRect();\n        const dx = (e.clientX - (r.left + r.width / 2)) * 0.18;\n        const dy = (e.clientY - (r.top + r.height / 2)) * 0.3;\n        el.style.transition = 'transform 0.12s ease-out';\n        el.style.transform = 'translate(' + dx.toFixed(1) + 'px,' + dy.toFixed(1) + 'px)';\n      } else if (this._magnetEl) {\n        this.resetMagnet();\n      }\n    };\n    document.addEventListener('pointermove', this._magnetMove);\n  }\n\n  resetMagnet() {\n    const el = this._magnetEl;\n    if (!el) return;\n    el.style.transition = 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1)';\n    el.style.transform = 'translate(0px, 0px)';\n    this._magnetEl = null;\n  }\n\n  setupParallax() {\n    if (this._reduced) return;\n    this._onScroll = () => {\n      const card = document.querySelector('[data-parallax]');\n      if (card) {\n        const y = Math.min(window.scrollY, 700);\n        card.style.transform = 'translateY(' + (y * -0.06).toFixed(1) + 'px)';\n      }\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n  }\n\n  speed() { return this.props.demoSpeed ?? 1; }\n\n  playConvo(idx) {\n    if (this.state.live) return;\n    this.setState({ convoIdx: idx, msgs: [], typing: false });\n    let i = 0;\n    const c = this.conversations[idx];\n    const step = () => {\n      if (this.state.live) return;\n      if (i >= c.messages.length) {\n        this.timer = setTimeout(() => this.playConvo((idx + 1) % this.conversations.length), 3500 / this.speed());\n        return;\n      }\n      const item = c.messages[i++];\n      if (item.type === 'typing') {\n        this.setState({ typing: true });\n        this.timer = setTimeout(() => { this.setState({ typing: false }); step(); }, 1100 / this.speed());\n      } else {\n        this.setState((s) => ({ msgs: [...s.msgs, item] }));\n        this.timer = setTimeout(step, (item.type === 'client' ? 950 : 1500) / this.speed());\n      }\n    };\n    this.timer = setTimeout(step, 800 / this.speed());\n  }\n\n  msgStyle(type) {\n    const base = { maxWidth: '82%', padding: '10px 15px', borderRadius: '14px', fontSize: '14px', lineHeight: 1.55, animation: 'msgIn 0.35s ease both' };\n    if (type === 'client') return { ...base, alignSelf: 'flex-end', background: '#2E6B4F', color: '#FFFDF7', borderBottomRightRadius: '4px' };\n    if (type === 'action') return { ...base, alignSelf: 'flex-start', background: 'transparent', border: '1px dashed #2E6B4F', color: '#2E6B4F', fontSize: '12.5px', fontWeight: 600, borderRadius: '10px' };\n    return { ...base, alignSelf: 'flex-start', background: '#F5F0E6', border: '1px solid #E3DAC6', color: '#211C13', borderBottomLeftRadius: '4px' };\n  }\n\n  goLive() {\n    if (this.state.live) return;\n    clearTimeout(this.timer);\n    this.liveHistory = [];\n    this.setState({\n      live: true, typing: false,\n      msgs: [{ type: 'bot', text: \"Hi! I'm the AI front desk for Bright Smile Dental. Ask me about services, hours, or booking a visit.\" }],\n    });\n  }\n\n  async sendLive(e) {\n    e.preventDefault();\n    const text = this.state.chatInput.trim();\n    if (!text || this.state.busy) return;\n    this.goLive();\n    this.liveHistory.push({ role: 'user', content: text });\n    this.setState((s) => ({ msgs: [...s.msgs, { type: 'client', text }], chatInput: '', busy: true, typing: true }));\n    try {\n      let reply;\n      if (typeof window !== 'undefined' && window.claude && window.claude.complete) {\n        // Workspace preview — use the built-in helper.\n        reply = await window.claude.complete({\n          system: 'You are BizAssist, the AI front desk for Bright Smile Dental, a friendly neighborhood dental clinic. Hours: Mon-Fri 9am-6pm, Sat 10am-2pm. Services and prices: cleaning $95, checkup with x-rays $120, whitening $250, fillings from $150, same-day emergency visits. Open slots this week: Thursday 2:00 PM, Friday 10:30 AM, Saturday 11:15 AM. Keep every reply under 50 words, warm and efficient, plain text only. To book: collect name and phone number, then confirm the slot. For complex medical questions, complaints, or billing disputes, offer to connect them with the office team. Never break character.',\n          messages: this.liveHistory,\n          max_tokens: 300,\n        });\n      } else {\n        // Deployed — call the real /api/chat backend from the Techlyne repo.\n        const res = await fetch('/api/chat', {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json' },\n          body: JSON.stringify({ messages: this.liveHistory, visitor: (function(){ try { var v = localStorage.getItem('bz_vid') || (document.cookie.split('; ').find(function(c){ return c.indexOf('bzid=') === 0; }) || '').slice(5); if (!v) { v = Math.random().toString(36).slice(2) + Date.now().toString(36); } localStorage.setItem('bz_vid', v); document.cookie = 'bzid=' + v + '; path=/; max-age=31536000; SameSite=Lax'; return v; } catch (e) { return ''; } })() }),\n        });\n        const data = await res.json().catch(() => ({}));\n        if (!res.ok) { const e = new Error(data.error || 'request failed'); if (res.status === 429 && data.error) e.showToUser = true; throw e; }\n        reply = data.reply;\n      }\n      this.liveHistory.push({ role: 'assistant', content: reply });\n      this.setState((s) => ({ msgs: [...s.msgs, { type: 'bot', text: reply }], busy: false, typing: false }));\n    } catch (err) {\n      this.setState((s) => ({ msgs: [...s.msgs, { type: 'bot', text: (err && err.showToUser && err.message) ? err.message : 'Connection hiccup. Please try again in a moment.' }], busy: false, typing: false }));\n    }\n  }\n\n  signup(which, e) {\n    e.preventDefault();\n    const email = (which === 'hero' ? this.state.heroEmail : this.state.ctaEmail).trim();\n    if (!email || !email.includes('@')) return;\n    try {\n      const emails = JSON.parse(localStorage.getItem('bizassist_emails') || '[]');\n      emails.push({ email, date: new Date().toISOString() });\n      localStorage.setItem('bizassist_emails', JSON.stringify(emails));\n    } catch (err) {}\n    this.setState(which === 'hero' ? { heroDone: true } : { ctaDone: true });\n  }\n\n  toggleFaq(i) {\n    this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i }));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const convo = this.conversations[s.convoIdx];\n    const dot = (on) => ({ width: '6px', height: '6px', borderRadius: '50%', background: on ? '#2E6B4F' : '#D8CFBB', transition: 'background 0.3s' });\n    const sign = (i) => (s.openFaq === i ? '−' : '+');\n    return {\n      chatMsgs: s.msgs.map((m) => ({ text: m.text, style: this.msgStyle(m.type) })),\n      typing: s.typing,\n      chatName: s.live ? 'BizAssist live demo' : convo.name,\n      chatLabel: s.live ? \"Live — you're chatting with the AI\" : convo.label,\n      chatAvatarText: s.live ? '🤖' : convo.avatar,\n      clockTime: this.formatClock(s.now),\n      nightTicker: this.tickerMsgs[(s.tickIdx || 0) % this.tickerMsgs.length],\n      dotsVisible: !s.live,\n      dot0Style: dot(!s.live && s.convoIdx === 0),\n      dot1Style: dot(!s.live && s.convoIdx === 1),\n      chatRef: this.chatRef,\n      chatInput: s.chatInput,\n      onChatInput: (e) => this.setState({ chatInput: e.target.value }),\n      sendLive: (e) => this.sendLive(e),\n      chatBusy: s.busy,\n      liveChatEnabled: this.props.liveChat ?? true,\n      heroEmail: s.heroEmail,\n      onHeroEmail: (e) => this.setState({ heroEmail: e.target.value }),\n      heroSubmit: (e) => this.signup('hero', e),\n      heroDone: s.heroDone,\n      heroFormVisible: !s.heroDone,\n      ctaEmail: s.ctaEmail,\n      onCtaEmail: (e) => this.setState({ ctaEmail: e.target.value }),\n      ctaSubmit: (e) => this.signup('cta', e),\n      ctaDone: s.ctaDone,\n      ctaFormVisible: !s.ctaDone,\n      faqOpen0: s.openFaq === 0, faqOpen1: s.openFaq === 1, faqOpen2: s.openFaq === 2, faqOpen3: s.openFaq === 3, faqOpen4: s.openFaq === 4,\n      faqSign0: sign(0), faqSign1: sign(1), faqSign2: sign(2), faqSign3: sign(3), faqSign4: sign(4),\n      toggleFaq0: () => this.toggleFaq(0),\n      toggleFaq1: () => this.toggleFaq(1),\n      toggleFaq2: () => this.toggleFaq(2),\n      toggleFaq3: () => this.toggleFaq(3),\n      toggleFaq4: () => this.toggleFaq(4),\n    };\n  }\n}\n<\u002Fscript>\n\n\n</body></html>"
  </script>
  <script>
    // mailto: links silently do nothing when no mail app is configured (common on Windows).
    // Every mailto click also copies the address and shows it, so "Contact us" always works.
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest('a[href^="mailto:"]');
      if (!a) return;
      var addr = a.getAttribute("href").replace(/^mailto:/, "").split("?")[0];
      try { navigator.clipboard && navigator.clipboard.writeText(addr); } catch (err) {}
      if (!a.dataset.orig) a.dataset.orig = a.textContent;
      a.textContent = "Copied " + addr + " ✓";
      setTimeout(function () { a.textContent = a.dataset.orig; }, 1800);
    });
  </script>
