<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat — book an appointment</title>
  <style>
    :root { --green:#2E6B4F; --ink:#211C13; --muted:#7C7361; --bg:#F5F1EA; --card:#fff; --line:#E7E0D5; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); display:flex; flex-direction:column; }
    header { background:var(--card); border-bottom:1px solid var(--line); padding:14px 18px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    header .avatar { width:34px; height:34px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
    header .t { font-weight:700; font-size:15.5px; }
    header .s { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; }
    header .dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; }

    main { flex:1; overflow-y:auto; padding:20px 16px; }
    .thread { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:80%; padding:11px 15px; border-radius:16px; font-size:15px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; }
    .msg.bot { background:var(--card); border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:5px; }
    .msg.user { background:var(--green); color:#fff; align-self:flex-end; border-bottom-right-radius:5px; }
    .msg.typing { color:var(--muted); font-style:italic; }

    footer { background:var(--card); border-top:1px solid var(--line); padding:12px 16px; flex-shrink:0; }
    .composer { max-width:640px; margin:0 auto; display:flex; gap:10px; }
    textarea { flex:1; resize:none; border:1px solid var(--line); border-radius:12px; padding:11px 14px; font-size:15px; font-family:inherit; max-height:120px; }
    textarea:focus { outline:2px solid var(--green); outline-offset:1px; border-color:var(--green); }
    button { background:var(--green); color:#fff; border:0; border-radius:12px; padding:0 20px; font-size:15px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .err { color:#B4402E; font-size:13px; text-align:center; margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <div class="avatar" id="avatar">💬</div>
    <div>
      <div class="t" id="hdrTitle">Front desk</div>
      <div class="s"><span class="dot"></span> Online — ask about services, hours, or booking</div>
    </div>
  </header>

  <main id="main"><div class="thread" id="thread"></div></main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send">Send</button>
    </div>
    <div class="err" id="err"></div>
  </footer>

  <script>
    const $ = (id) => document.getElementById(id);
    // Tenant slug from the path: /c/<slug>
    const SLUG = decodeURIComponent(location.pathname.replace(/^\/c\//, "").replace(/\/$/, ""));
    const history = []; // { role: 'user'|'assistant', content }

    function addMsg(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + (role === "user" ? "user" : "bot");
      el.textContent = text;
      $("thread").appendChild(el);
      $("main").scrollTop = $("main").scrollHeight;
      return el;
    }

    function autosize() {
      const t = $("input");
      t.style.height = "auto";
      t.style.height = Math.min(t.scrollHeight, 120) + "px";
    }

    async function send() {
      const text = $("input").value.trim();
      if (!text) return;
      $("err").textContent = "";
      $("input").value = ""; autosize();
      addMsg("user", text);
      history.push({ role: "user", content: text });

      $("send").disabled = true;
      const typing = addMsg("bot", "…");
      typing.classList.add("typing");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ slug: SLUG, messages: history }),
        });
        const data = await res.json();
        typing.remove();
        if (!res.ok) throw new Error(data.error || "Something went wrong");
        addMsg("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch (e) {
        typing.remove();
        $("err").textContent = e.message;
      } finally {
        $("send").disabled = false;
        $("input").focus();
      }
    }

    $("send").addEventListener("click", send);
    $("input").addEventListener("input", autosize);
    $("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Opening greeting (client-side; the bot personalizes from here using the tenant config).
    addMsg("bot", "Hi! 👋 I'm the front desk assistant. Ask me about services, hours, or booking an appointment.");
    $("input").focus();
  </script>
</body>
</html>
